[databases]
car_sales = host=db port=5432 dbname=car_sales

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction

default_pool_size = 20
reserve_pool_size = 5
reserve_pool_timeout = 3

max_client_conn = 400

server_idle_timeout = 600
client_idle_timeout = 0

server_reset_query =

log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

tcp_keepalive = 1
tcp_defer_accept = 1

admin_users = postgres
stats_users = postgres
