gzip_vary on;
gzip_proxied any;
gzip_comp_level 4;
gzip_types application/json text/plain application/xml text/xml text/css application/javascript application/x-javascript text/javascript;
gzip_min_length 2048;

brotli_comp_level 4;
brotli_types application/json text/plain application/xml text/xml text/css application/javascript application/x-javascript text/javascript;
brotli_min_length 2048;

proxy_cache_path /var/cache/nginx
    levels=1:2
    keys_zone=api_cache:10m
    max_size=256m
    inactive=10m
    use_temp_path=off;

upstream backend {
    server backend:8000;
    keepalive 256;
    keepalive_requests 10000;
    keepalive_timeout 60s;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name fastauto.store www.fastauto.store;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name fastauto.store www.fastauto.store;

    ssl_certificate /etc/letsencrypt/live/fastauto.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fastauto.store/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Cars API — cached ─────────────────────────────────────────────────────
    location ~ ^/api/v1/cars {
        include /etc/nginx/security_headers.conf;

        proxy_cache             api_cache;
        proxy_cache_key         "$request_method$request_uri";
        proxy_cache_valid       200 600s;
        proxy_cache_methods     GET HEAD;
        proxy_cache_lock        on;
        proxy_cache_lock_timeout 2s;
        proxy_cache_use_stale   error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_revalidate  on;
        proxy_cache_bypass      $needs_auth_bypass;
        proxy_no_cache          $needs_auth_bypass;

        proxy_pass              http://backend;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $remote_addr;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_connect_timeout   5s;
        proxy_send_timeout      30s;
        proxy_read_timeout      30s;
        add_header              X-Cache-Status $upstream_cache_status;
    }

    # ── All other API routes — no cache ───────────────────────────────────────
    location /api/ {
        include /etc/nginx/security_headers.conf;

        proxy_pass          http://backend;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout  60s;
        proxy_read_timeout  60s;
    }

    # ── MinIO file storage ────────────────────────────────────────────────────
    location /minio/ {
        proxy_pass              http://minio:9000/;
        proxy_http_version      1.1;
        proxy_set_header        Host minio:9000;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $remote_addr;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_connect_timeout   5s;
        proxy_send_timeout      300s;
        proxy_read_timeout      300s;
        proxy_buffering         off;
        proxy_request_buffering off;
        client_max_body_size    100M;
    }

    # ── Vite assets — aggressive caching (content-hashed filenames) ───────────
    location /assets/ {
        include /etc/nginx/security_headers.conf;
        root    /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Frontend SPA — all other routes ───────────────────────────────────────
    location / {
        include /etc/nginx/security_headers.conf;
        root    /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
