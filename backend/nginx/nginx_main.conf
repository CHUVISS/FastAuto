user nginx;
worker_processes auto;
worker_rlimit_nofile 65536;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log off;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  65;

    gzip on;
    brotli on;
    brotli_static on;

    map $request_uri $needs_auth_bypass {
        default               0;
        "~^/api/v1/admin"     1;
        "~^/api/v1/user"      1;
        "~^/api/v1/deals"     1;
        "~^/api/v1/messages"  1;
        "~^/api/v1/viewings"  1;
        "~^/api/v1/clients"   1;
        "~^/api/v1/ai"        1;
        "~^/api/v1/auth"      1;
    }

    include /etc/nginx/conf.d/*.conf;
}
